# config.yaml — runtime configuration for this project
# Single source of truth for model settings, endpoints, and limits.
# Instructions (Project Instructions.md) define BEHAVIOR; this file defines PARAMETERS.
# Skills and prompts must read values from here, never hardcode them.

model:
  name: claude-sonnet-4-6        # default model for API calls made by artifacts/scripts
  temperature: 0.2               # low — this project favors precision over creativity
  max_tokens: 4000               # default completion budget
  max_tokens_summary: 1000       # budget for short summarization tasks

api:
  anthropic_endpoint: https://api.anthropic.com/v1/messages
  timeout_seconds: 60
  retry_attempts: 2

limits:
  max_doc_length_words: 2500     # split a doc when it grows past this
  max_prompt_examples: 5         # few-shot prompts carry at most this many examples
  index_review_interval_days: 30 # audit INDEX.md against the filesystem this often

paths:
  # Lifecycle — skills write documents here
  drafts: drafts/
  final: final/
  archive: archive/
  decisions: decisions/

  # Governance files — skills update these on nearly every operation
  index: INDEX.md
  glossary: glossary.md

  # Resources — read from or filed into, rarely rewritten
  templates: templates/
  prompts: prompts/
  references_sources: references/sources/
  references_reading: references/reading/
  assets_images: assets/images/
  assets_diagrams: assets/diagrams/
  notes: notes/
  # skills/ is intentionally NOT listed: skills are discovered by the
  # platform, not resolved via config paths

defaults:
  doc_language: en
  date_format: YYYY-MM-DD
  front_matter_required: [title, type, status, updated, tags]
